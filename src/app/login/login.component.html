<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            @if(error==1){
                <div class="alert alert-danger">
                    <strong>Login ou mot de passe incorrecte!</strong>
                </div>
            }
            <form>
                <div class="form-group">
                    <label>Nom User :</label>
                    <input type="text" name="userName" class="form-control" [(ngModel)]="user.username">
                </div>
                <div class="form-group">
                    <label>Mot de passe :</label>
                    <input type="text" name="userName" class="form-control" [(ngModel)]="user.password">
                </div>
                <div class="row justify-content-center mt-2">
                <div class="form-group">
                    <button type="button" class="btn btn-success" (click)="onLoggedIn()">Log In</button>
                </div>
                </div>
            </form>
        </div>
    </div>
</div>
